name: movi
description: "Application Flutter de streaming et de gestion de bibliotheque media."
publish_to: "none"
version: 1.0.3+13

environment:
  sdk: ^3.9.2
  flutter: ">=3.38.0"

dependencies:
  equatable: ^2.0.7
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  crypto: ^3.0.3
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter_riverpod: ^3.0.3
  get_it: ^9.0.5
  go_router: ^16.3.0
  dio: ^5.7.0
  supabase_flutter: ^2.10.0
  google_fonts: ^6.2.1
  sqflite: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.2
  sqflite_common_ffi: ^2.3.6
  flutter_secure_storage: ^9.2.4
  encrypt: ^5.0.3
  clock: ^1.1.2
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  flutter_local_notifications: ^21.0.0
  media_kit: ^1.2.2
  media_kit_video: ^2.0.0
  media_kit_libs_video: ^1.0.7
  screen_brightness: ^0.2.2+1
  volume_controller: ^2.0.7
  in_app_purchase: ^3.2.3
  url_launcher: ^6.3.2
  package_info_plus: ^8.3.1
  flutter_secure_storage_platform_interface: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.13

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/branding/
    - assets/icons/navigation/
    - assets/icons/actions/
    - assets/icons/media/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  remove_alpha_ios: true
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: assets/branding/app_icon.png

msix_config:
  display_name: Movi
  msix_version: 1.0.3.0
  logo_path: C:\Users\berny\DEV\Flutter\movi\windows\runner\resources\app_icon.png
  publisher_display_name: TheSamurai
  identity_name: TheSamurai.Movi
  publisher: CN=TheSamurai
