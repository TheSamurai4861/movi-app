include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - docs/**
    - build/**
    - .dart_tool/**
    - output/**
    # Fixtures intentionnellement "invalides" (canary) pour prouver les règles d'architecture.
    # Ne doivent pas impacter `flutter analyze` (gate CI).
    - tool/arch_lint_canary/**

linter:
  rules:
    - always_use_package_imports
    - avoid_print
