name: Build premium unsigned iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-premium-unsigned-ios-ipa-${{ github.ref }}
  cancel-in-progress: true

# Required GitHub secrets:
# - TMDB_API_KEY_PROD
# - SUPABASE_ANON_KEY
#
# Required GitHub variables:
# - SUPABASE_URL
# - SUPABASE_PROJECT_REF

jobs:
  metadata:
    name: Resolve version metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: version
        name: Read version from pubspec.yaml
        shell: bash
        run: |
          set -euo pipefail

          raw_version="$(awk '/^version: / { print $2; exit }' pubspec.yaml)"
          if [ -z "$raw_version" ]; then
            echo "Unable to read version from pubspec.yaml" >&2
            exit 1
          fi

          build_name="${raw_version%%+*}"
          build_number="${raw_version##*+}"
          if [ "$build_number" = "$raw_version" ]; then
            build_number="1"
          fi

          echo "app_version=$raw_version" >> "$GITHUB_OUTPUT"
          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

  ios:
    name: Build premium unsigned IPA
    runs-on: macos-latest
    needs: metadata
    env:
      APP_VERSION: ${{ needs.metadata.outputs.app_version }}
      BUILD_NAME: ${{ needs.metadata.outputs.build_name }}
      BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create premium CI define file
        shell: bash
        env:
          TMDB_API_KEY_PROD: ${{ secrets.TMDB_API_KEY_PROD }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          required=(
            TMDB_API_KEY_PROD
            SUPABASE_URL
            SUPABASE_ANON_KEY
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret or variable: $key" >&2
              exit 1
            fi
          done

          cat > .env.ci <<EOF
          APP_ENV=prod
          TMDB_API_KEY=${TMDB_API_KEY_PROD}
          TMDB_API_KEY_PROD=${TMDB_API_KEY_PROD}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
          FORCE_PREMIUM=true
          ALLOW_FORCE_PREMIUM_IN_RELEASE=true
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build premium unsigned iOS app
        shell: bash
        run: |
          set -euo pipefail

          flutter build ios \
            --release \
            --no-codesign \
            --flavor prod \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define-from-file=.env.ci

      - name: Package premium unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          (
            cd build/ios/ipa
            zip -r "../../../dist/movi-premium-${APP_VERSION}.ipa" Payload
          )

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: movi-premium-ios-${{ env.APP_VERSION }}
          path: dist/movi-premium-${{ env.APP_VERSION }}.ipa
          retention-days: 30
name: Build premium signed iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-premium-signed-ios-ipa-${{ github.ref }}
  cancel-in-progress: true

# Required GitHub secrets:
# - TMDB_API_KEY_PROD
# - SUPABASE_ANON_KEY
# - APPLE_CERTIFICATE_P12_BASE64
# - APPLE_CERTIFICATE_PASSWORD
# - APPLE_PROVISIONING_PROFILE_BASE64
#
# Required GitHub variables:
# - SUPABASE_URL
# - SUPABASE_PROJECT_REF
#
# Optional GitHub variables:
# - IOS_EXPORT_METHOD (default: ad-hoc)

jobs:
  metadata:
    name: Resolve version metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: version
        name: Read version from pubspec.yaml
        shell: bash
        run: |
          set -euo pipefail

          raw_version="$(awk '/^version: / { print $2; exit }' pubspec.yaml)"
          if [ -z "$raw_version" ]; then
            echo "Unable to read version from pubspec.yaml" >&2
            exit 1
          fi

          build_name="${raw_version%%+*}"
          build_number="${raw_version##*+}"
          if [ "$build_number" = "$raw_version" ]; then
            build_number="1"
          fi

          echo "app_version=$raw_version" >> "$GITHUB_OUTPUT"
          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

  ios:
    name: Build premium signed IPA
    runs-on: macos-latest
    needs: metadata
    env:
      APP_VERSION: ${{ needs.metadata.outputs.app_version }}
      BUILD_NAME: ${{ needs.metadata.outputs.build_name }}
      BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
      IOS_EXPORT_METHOD: ${{ vars.IOS_EXPORT_METHOD || 'ad-hoc' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create premium CI define file
        shell: bash
        env:
          TMDB_API_KEY_PROD: ${{ secrets.TMDB_API_KEY_PROD }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          required=(
            TMDB_API_KEY_PROD
            SUPABASE_URL
            SUPABASE_ANON_KEY
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret or variable: $key" >&2
              exit 1
            fi
          done

          cat > .env.ci <<EOF
          APP_ENV=prod
          TMDB_API_KEY=${TMDB_API_KEY_PROD}
          TMDB_API_KEY_PROD=${TMDB_API_KEY_PROD}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
          FORCE_PREMIUM=true
          ALLOW_FORCE_PREMIUM_IN_RELEASE=true
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Install iOS signing assets
        shell: bash
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail

          required=(
            APPLE_CERTIFICATE_P12_BASE64
            APPLE_CERTIFICATE_PASSWORD
            APPLE_PROVISIONING_PROFILE_BASE64
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

          CERT_PATH="$RUNNER_TEMP/movi-signing-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/movi-signing-profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/movi-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 20)"

          printf '%s' "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PLIST_PATH="$RUNNER_TEMP/movi-signing-profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST_PATH"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' "$PROFILE_PLIST_PATH")"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          {
            echo "IOS_SIGNING_KEYCHAIN_PATH=$KEYCHAIN_PATH"
            echo "IOS_SIGNING_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD"
            echo "IOS_PROFILE_PATH=$PROFILE_PATH"
            echo "IOS_PROFILE_UUID=$PROFILE_UUID"
          } >> "$GITHUB_ENV"

      - name: Create iOS export options
        shell: bash
        run: |
          set -euo pipefail

          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>${IOS_EXPORT_METHOD}</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

      - name: Build signed premium IPA
        shell: bash
        run: |
          set -euo pipefail

          flutter build ipa \
            --release \
            --flavor prod \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define-from-file=.env.ci \
            --export-options-plist=ios/ExportOptions.plist

          mkdir -p dist
          IPA_PATH="$(ls build/ios/ipa/*.ipa | head -n 1)"
          cp "$IPA_PATH" "dist/movi-premium-${APP_VERSION}.ipa"

      - name: Upload signed iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: movi-premium-ios-signed-${{ env.APP_VERSION }}
          path: dist/movi-premium-${{ env.APP_VERSION }}.ipa
          retention-days: 30

      - name: Cleanup iOS signing assets
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${IOS_SIGNING_KEYCHAIN_PATH:-}" ] && [ -f "${IOS_SIGNING_KEYCHAIN_PATH}" ]; then
            security delete-keychain "${IOS_SIGNING_KEYCHAIN_PATH}" || true
          fi

          if [ -n "${IOS_PROFILE_UUID:-}" ]; then
            rm -f "$HOME/Library/MobileDevice/Provisioning Profiles/${IOS_PROFILE_UUID}.mobileprovision"
          fi
