name: Build premium unsigned iOS IPA

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-premium-unsigned-ios-ipa-${{ github.ref }}
  cancel-in-progress: true

# Required GitHub secrets:
# - TMDB_API_KEY_PROD
# - SUPABASE_ANON_KEY
#
# Required GitHub variables:
# - SUPABASE_URL
# - SUPABASE_PROJECT_REF

jobs:
  metadata:
    name: Resolve version metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: version
        name: Read version from pubspec.yaml
        shell: bash
        run: |
          set -euo pipefail

          raw_version="$(awk '/^version: / { print $2; exit }' pubspec.yaml)"
          if [ -z "$raw_version" ]; then
            echo "Unable to read version from pubspec.yaml" >&2
            exit 1
          fi

          build_name="${raw_version%%+*}"
          build_number="${raw_version##*+}"
          if [ "$build_number" = "$raw_version" ]; then
            build_number="1"
          fi

          echo "app_version=$raw_version" >> "$GITHUB_OUTPUT"
          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

  ios:
    name: Build premium unsigned IPA
    runs-on: macos-latest
    needs: metadata
    env:
      APP_VERSION: ${{ needs.metadata.outputs.app_version }}
      BUILD_NAME: ${{ needs.metadata.outputs.build_name }}
      BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create premium CI define file
        shell: bash
        env:
          TMDB_API_KEY_PROD: ${{ secrets.TMDB_API_KEY_PROD }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          required=(
            TMDB_API_KEY_PROD
            SUPABASE_URL
            SUPABASE_ANON_KEY
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret or variable: $key" >&2
              exit 1
            fi
          done

          cat > .env.ci <<EOF
          APP_ENV=prod
          TMDB_API_KEY=${TMDB_API_KEY_PROD}
          TMDB_API_KEY_PROD=${TMDB_API_KEY_PROD}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
          FORCE_PREMIUM=true
          ALLOW_FORCE_PREMIUM_IN_RELEASE=true
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build premium unsigned iOS app
        shell: bash
        run: |
          set -euo pipefail

          flutter build ios \
            --release \
            --no-codesign \
            --flavor prod \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define-from-file=.env.ci

      - name: Package premium unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          (
            cd build/ios/ipa
            zip -r "../../../dist/movi-premium-${APP_VERSION}.ipa" Payload
          )

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: movi-premium-ios-${{ env.APP_VERSION }}
          path: dist/movi-premium-${{ env.APP_VERSION }}.ipa
          retention-days: 30