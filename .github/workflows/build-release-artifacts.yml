name: Build release artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-release-artifacts-${{ github.ref }}
  cancel-in-progress: true

# Required GitHub secrets:
# - TMDB_API_KEY_PROD
# - SUPABASE_URL
# - SUPABASE_ANON_KEY
# - SUPABASE_PROJECT_REF
# - MOVI_KEYSTORE_BASE64
# - MOVI_STORE_PASSWORD
# - MOVI_ALIAS
# - MOVI_KEY_PASSWORD
#
# Notes:
# - Android signing reuses the validated keystore path expected by
#   android/app/build.gradle.kts.
# - iOS produces an unsigned IPA named movi-{version}.ipa.
# - AltStore and Sideloadly can re-sign that IPA during installation.

jobs:
  metadata:
    name: Resolve version metadata
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.version.outputs.app_version }}
      build_name: ${{ steps.version.outputs.build_name }}
      build_number: ${{ steps.version.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - id: version
        name: Read version from pubspec.yaml
        shell: bash
        run: |
          set -euo pipefail

          raw_version="$(awk '/^version: / { print $2; exit }' pubspec.yaml)"
          if [ -z "$raw_version" ]; then
            echo "Unable to read version from pubspec.yaml" >&2
            exit 1
          fi

          build_name="${raw_version%%+*}"
          build_number="${raw_version##*+}"
          if [ "$build_number" = "$raw_version" ]; then
            build_number="1"
          fi

          echo "app_version=$raw_version" >> "$GITHUB_OUTPUT"
          echo "build_name=$build_name" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"

  verify:
    name: Analyze and test
    runs-on: ubuntu-latest
    needs: metadata
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create CI define file
        shell: bash
        env:
          TMDB_API_KEY_PROD: ${{ secrets.TMDB_API_KEY_PROD }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          required=(
            TMDB_API_KEY_PROD
            SUPABASE_URL
            SUPABASE_ANON_KEY
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

          cat > .env.ci <<EOF
          APP_ENV=prod
          TMDB_API_KEY=${TMDB_API_KEY_PROD}
          TMDB_API_KEY_PROD=${TMDB_API_KEY_PROD}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze

      - name: Run test suite
        run: flutter test --dart-define-from-file=.env.ci

  android:
    name: Build Android app bundle
    runs-on: ubuntu-latest
    needs:
      - metadata
      - verify
    env:
      APP_VERSION: ${{ needs.metadata.outputs.app_version }}
      BUILD_NAME: ${{ needs.metadata.outputs.build_name }}
      BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create CI define file
        shell: bash
        env:
          TMDB_API_KEY_PROD: ${{ secrets.TMDB_API_KEY_PROD }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          required=(
            TMDB_API_KEY_PROD
            SUPABASE_URL
            SUPABASE_ANON_KEY
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

          cat > .env.ci <<EOF
          APP_ENV=prod
          TMDB_API_KEY=${TMDB_API_KEY_PROD}
          TMDB_API_KEY_PROD=${TMDB_API_KEY_PROD}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
          EOF

      - name: Install Android signing assets
        shell: bash
        env:
          MOVI_KEYSTORE_BASE64: ${{ secrets.MOVI_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [ -z "${MOVI_KEYSTORE_BASE64:-}" ]; then
            echo "Missing required secret: MOVI_KEYSTORE_BASE64" >&2
            exit 1
          fi

          mkdir -p android/app
          printf '%s' "$MOVI_KEYSTORE_BASE64" | base64 --decode > android/app/movi-release.jks

      - name: Install dependencies
        run: flutter pub get

      - name: Build signed Android app bundle
        shell: bash
        env:
          MOVI_KEYSTORE: android/app/movi-release.jks
          MOVI_STORE_PASSWORD: ${{ secrets.MOVI_STORE_PASSWORD }}
          MOVI_ALIAS: ${{ secrets.MOVI_ALIAS }}
          MOVI_KEY_PASSWORD: ${{ secrets.MOVI_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            MOVI_STORE_PASSWORD
            MOVI_ALIAS
            MOVI_KEY_PASSWORD
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

          flutter build appbundle \
            --release \
            --flavor prod \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define-from-file=.env.ci

          mkdir -p dist
          cp build/app/outputs/bundle/prodRelease/app-prod-release.aab "dist/movi-${APP_VERSION}.aab"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: movi-android-${{ env.APP_VERSION }}
          path: dist/movi-${{ env.APP_VERSION }}.aab
          retention-days: 30

  windows:
    name: Build Windows release
    runs-on: windows-latest
    needs:
      - metadata
      - verify
    env:
      APP_VERSION: ${{ needs.metadata.outputs.app_version }}
      BUILD_NAME: ${{ needs.metadata.outputs.build_name }}
      BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create CI define file
        shell: pwsh
        env:
          TMDB_API_KEY_PROD: ${{ secrets.TMDB_API_KEY_PROD }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          $required = @(
            'TMDB_API_KEY_PROD',
            'SUPABASE_URL',
            'SUPABASE_ANON_KEY'
          )

          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name").Value)) {
              throw "Missing required secret: $name"
            }
          }

          @"
          APP_ENV=prod
          TMDB_API_KEY=$env:TMDB_API_KEY_PROD
          TMDB_API_KEY_PROD=$env:TMDB_API_KEY_PROD
          SUPABASE_URL=$env:SUPABASE_URL
          SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY
          SUPABASE_PROJECT_REF=$env:SUPABASE_PROJECT_REF
          "@ | Set-Content -Path .env.ci -NoNewline

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows executable
        shell: pwsh
        run: |
          flutter build windows --release --build-name $env:BUILD_NAME --build-number $env:BUILD_NUMBER --dart-define-from-file=.env.ci

      - name: Package Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/windows/x64/runner/Release/movi.exe ("dist/movi-" + $env:APP_VERSION + ".exe")
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath ("dist/movi-" + $env:APP_VERSION + "-windows.zip") -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: movi-windows-${{ env.APP_VERSION }}
          path: dist/*
          retention-days: 30

  ios:
    name: Build iOS unsigned IPA
    runs-on: macos-latest
    needs:
      - metadata
      - verify
    env:
      APP_VERSION: ${{ needs.metadata.outputs.app_version }}
      BUILD_NAME: ${{ needs.metadata.outputs.build_name }}
      BUILD_NUMBER: ${{ needs.metadata.outputs.build_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create CI define file
        shell: bash
        env:
          TMDB_API_KEY_PROD: ${{ secrets.TMDB_API_KEY_PROD }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail

          required=(
            TMDB_API_KEY_PROD
            SUPABASE_URL
            SUPABASE_ANON_KEY
          )

          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required secret: $key" >&2
              exit 1
            fi
          done

          cat > .env.ci <<EOF
          APP_ENV=prod
          TMDB_API_KEY=${TMDB_API_KEY_PROD}
          TMDB_API_KEY_PROD=${TMDB_API_KEY_PROD}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SUPABASE_PROJECT_REF=${SUPABASE_PROJECT_REF}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build unsigned iOS app
        shell: bash
        run: |
          set -euo pipefail

          flutter build ios \
            --release \
            --no-codesign \
            --build-name="$BUILD_NAME" \
            --build-number="$BUILD_NUMBER" \
            --dart-define-from-file=.env.ci

      - name: Package unsigned IPA
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload/Runner.app
          (
            cd build/ios/ipa
            zip -r "../../../dist/movi-${APP_VERSION}.ipa" Payload
          )

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: movi-ios-${{ env.APP_VERSION }}
          path: dist/movi-${{ env.APP_VERSION }}.ipa
          retention-days: 30
