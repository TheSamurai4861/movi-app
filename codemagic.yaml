workflows:
  ci-quality-proof:
    name: CI Quality Proof (no secrets)
    max_build_duration: 30
    environment:
      flutter: stable
    scripts:
      - name: Prepare proof folder
        script: |
          set -euxo pipefail
          rm -rf ci_proofs
          mkdir -p ci_proofs
          echo "commit=${CM_COMMIT:-unknown}" | tee ci_proofs/metadata.txt
          echo "branch=${CM_BRANCH:-unknown}" | tee -a ci_proofs/metadata.txt
          echo "workflow=ci-quality-proof" | tee -a ci_proofs/metadata.txt

      - name: Install dependencies (proof)
        script: |
          set -euxo pipefail
          flutter pub get 2>&1 | tee ci_proofs/flutter_pub_get.log

      - name: Static analysis (blocking, proof)
        script: |
          set -euxo pipefail
          flutter analyze 2>&1 | tee ci_proofs/flutter_analyze.log

      - name: Tests (proof)
        script: |
          set -euxo pipefail
          if [ -d test ]; then
            flutter test 2>&1 | tee ci_proofs/flutter_test.log
          else
            echo "No test directory found; skipping tests" | tee ci_proofs/flutter_test.log
          fi

      - name: Architecture wall (proof, blocking)
        script: |
          set -euxo pipefail
          dart run tool/arch_lint.dart --baseline docs/architecture/reports/arch_violations_baseline.md --out ci_proofs/arch_violations_delta.md 2>&1 | tee ci_proofs/arch_lint.log

      - name: Architecture canary suite (proof)
        script: |
          set -euxo pipefail
          dart run tool/arch_lint.dart \
            --scope tool/arch_lint_canary \
            --canary-fixtures \
            --expect-all-rules \
            --out ci_proofs/arch_canary_report.md 2>&1 | tee ci_proofs/arch_canary.log

    artifacts:
      - ci_proofs/*.log
      - ci_proofs/arch_violations_delta.md
      - ci_proofs/arch_canary_report.md
      - ci_proofs/metadata.txt

  ios-dev-ipa:
    name: iOS Dev IPA (unsigned)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      groups:
        - api
    scripts:
      - name: Prepare proof folder
        script: |
          set -euxo pipefail
          rm -rf ci_proofs
          mkdir -p ci_proofs
          echo "commit=${CM_COMMIT:-unknown}" | tee ci_proofs/metadata.txt
          echo "branch=${CM_BRANCH:-unknown}" | tee -a ci_proofs/metadata.txt
          echo "workflow=ios-dev-ipa" | tee -a ci_proofs/metadata.txt

      - name: Install dependencies
        script: |
          set -euxo pipefail
          flutter pub get 2>&1 | tee ci_proofs/flutter_pub_get.log

      - name: Analyze project
        script: |
          set -euxo pipefail
          flutter analyze 2>&1 | tee ci_proofs/flutter_analyze.log

      - name: Run tests when present
        script: |
          set -euxo pipefail
          if [ -d test ]; then
            flutter test 2>&1 | tee ci_proofs/flutter_test.log
          else
            echo "No test directory found; skipping tests" | tee ci_proofs/flutter_test.log
          fi

      - name: Load .env (optional for dev)
        script: |
          set -euxo pipefail
          set -a
          if [ -f .env ]; then
            echo "Loading .env for dev convenience"
            source .env
          else
            echo ".env not found; continuing"
          fi
          set +a

      - name: Check API vars (dev)
        script: |
          set -euxo pipefail
          echo "==== DEV vars check ===="
          echo "TMDB_API_KEY length: ${#TMDB_API_KEY}"
          echo "SUPABASE_URL length: ${#SUPABASE_URL}"
          echo "SUPABASE_ANON_KEY length: ${#SUPABASE_ANON_KEY}"

          if [ -z "$TMDB_API_KEY" ]; then
            echo "ERROR: TMDB_API_KEY is empty for dev build"
            exit 1
          fi

          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL is empty for dev build"
            exit 1
          fi

          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY is empty for dev build"
            exit 1
          fi
          echo "========================"

      - name: Build unsigned IPA (archive, APP_ENV=dev)
        script: |
          set -euxo pipefail
          echo "Building iOS Dev IPA..."
          flutter build ipa --release --no-codesign \
            --target=lib/main.dart \
            --dart-define=APP_ENV=dev \
            --dart-define=TMDB_API_KEY=${TMDB_API_KEY} \
            --dart-define=SUPABASE_URL=${SUPABASE_URL} \
            --dart-define=SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY} \
            --dart-define=FORCE_STARTUP_DETAILS=true

      - name: Package unsigned IPA from .xcarchive
        script: |
          set -euxo pipefail
          ARCHIVE="build/ios/archive/Runner.xcarchive"
          OUTDIR="build/ios/ipa"
          rm -rf "$OUTDIR"
          mkdir -p "$OUTDIR/Payload"
          cp -R "$ARCHIVE/Products/Applications/Runner.app" "$OUTDIR/Payload/Runner.app"
          (cd "$OUTDIR" && zip -r "Runner-unsigned-dev.ipa" "Payload")

    artifacts:
      - ci_proofs/*.log
      - ci_proofs/metadata.txt
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive

