workflows:
  ios-ipa:
    name: iOS IPA (unsigned)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Run widget tests
        script: flutter test
      - name: Build unsigned IPA (archive)
        script: flutter build ipa --release --no-codesign
      - name: Package unsigned IPA from .xcarchive
        script: |
          set -euxo pipefail
          ARCHIVE="build/ios/archive/Runner.xcarchive"
          OUTDIR="build/ios/ipa"
          rm -rf "$OUTDIR"
          mkdir -p "$OUTDIR/Payload"
          cp -R "$ARCHIVE/Products/Applications/Runner.app" "$OUTDIR/Payload/Runner.app"
          (cd "$OUTDIR" && zip -r "Runner-unsigned.ipa" "Payload")
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
