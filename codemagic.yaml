          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY is empty for dev build"
            exit 1
          fi
          echo "========================"

      - name: Build unsigned IPA (archive, APP_ENV=dev, FORCE_PREMIUM)
        script: |
          set -euxo pipefail
          echo "Building iOS Dev IPA (Premium forced)..."
          flutter build ipa --release --no-codesign \
