workflows:
  ios-ipa:
    name: iOS IPA (unsigned)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      vars:
        TMDB_API_KEY: eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI0ZjliZDI0YzhiMjYyNWUyMzk2ZTNlZjg2YTg5ZmU0YyIsIm5iZiI6MTY0ODM4MzU1My4yNDEsInN1YiI6IjYyNDA1NjQxYzc0MGQ5MDA0N2EzNmNjMyIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.KvWRTSdQiWBF2-KQhgN_7xzSJS8AS7xE3-A7fzxCno8
    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Check TMDB key length
        script: |
          echo "TMDB_API_KEY length: ${#TMDB_API_KEY}"
          if [ -z "$TMDB_API_KEY" ]; then
            echo "ERROR: TMDB_API_KEY is empty"
            exit 1
          fi

      - name: Build unsigned IPA (archive)
        script: |
          echo "Building iOS IPA with injected TMDB API key..."
          flutter build ipa --release --no-codesign \
            --target=lib/main.dart \
            --dart-define=TMDB_API_KEY=${TMDB_API_KEY} \
            --dart-define=TMDB_API_KEY_DEV=${TMDB_API_KEY} \
            --dart-define=TMDB_API_KEY_PROD=${TMDB_API_KEY} \
            --dart-define=APP_ENV=prod

      - name: Package unsigned IPA from .xcarchive
        script: |
          set -euxo pipefail
          ARCHIVE="build/ios/archive/Runner.xcarchive"
          OUTDIR="build/ios/ipa"
          rm -rf "$OUTDIR"
          mkdir -p "$OUTDIR/Payload"
          cp -R "$ARCHIVE/Products/Applications/Runner.app" "$OUTDIR/Payload/Runner.app"
          (cd "$OUTDIR" && zip -r "Runner-unsigned.ipa" "Payload")

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
