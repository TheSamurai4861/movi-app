workflows:
  ios-ipa:
    name: iOS IPA (unsigned)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Run widget tests
        script: flutter test
      - name: Build unsigned IPA
        script: flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      email:
        recipients:
          - "ton.email@exemple.com"
        # Optionnel :
        # notify:
        #   success: true
        #   failure: true
